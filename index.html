<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>ZüriHub Editor</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300..700;1,9..40,300..700&family=Instrument+Serif&display=swap" rel="stylesheet">
<style>
/* ═══════════ RESET & BASE ═══════════ */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f5f5f7;--bg2:#fff;--bg3:#fafafa;--fg:#1d1d1f;--fg2:#6e6e73;--fg3:#86868b;
  --border:#d2d2d7;--border2:#e5e5ea;
  --blue:#0F47AF;--blue-light:#e8eefb;--blue-lighter:#f2f5fc;--blue-dark:#0a3580;
  --red:#E63946;--red-light:#fef0f1;--green:#34c759;--green-light:#eafbef;
  --gold:#d4930d;--gold-light:#fef8e8;
  --radius:12px;--radius-sm:8px;--radius-xs:6px;
  --shadow:0 1px 3px rgba(0,0,0,.06),0 1px 2px rgba(0,0,0,.04);
  --shadow-lg:0 8px 30px rgba(0,0,0,.08);
  --font:'DM Sans',system-ui,-apple-system,sans-serif;
  --font-display:'Instrument Serif',Georgia,serif;
  --sidebar-w:260px;--edit-w:420px;
  --header-h:56px;
  --transition:.2s ease;
}
html.dark{
  --bg:#161618;--bg2:#1e1e20;--bg3:#252528;--fg:#f5f5f7;--fg2:#a1a1a6;--fg3:#6e6e73;
  --border:#38383a;--border2:#2c2c2e;
  --blue-light:#1a2540;--blue-lighter:#141c30;
  --red-light:#2a1215;--green-light:#142a18;--gold-light:#2a2210;
  --shadow:0 1px 3px rgba(0,0,0,.2);--shadow-lg:0 8px 30px rgba(0,0,0,.3);
}
html{font-family:var(--font);color:var(--fg);background:var(--bg);font-size:14px;line-height:1.5;-webkit-font-smoothing:antialiased}
body{min-height:100vh;overflow:hidden}
input,select,textarea,button{font-family:inherit;font-size:inherit}
a{color:var(--blue);text-decoration:none}

/* ═══════════ SCROLLBAR ═══════════ */
::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
::-webkit-scrollbar-thumb:hover{background:var(--fg3)}

/* ═══════════ HEADER ═══════════ */
.header{height:var(--header-h);background:var(--bg2);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 20px;gap:14px;position:sticky;top:0;z-index:100}
.logo{font-family:var(--font-display);font-size:1.4rem;color:var(--blue);white-space:nowrap;letter-spacing:-.02em}
.logo span{color:var(--fg3);font-family:var(--font);font-size:.72rem;font-weight:400;margin-left:6px;vertical-align:middle}
.tabs{display:flex;gap:2px;background:var(--bg);border-radius:var(--radius-sm);padding:2px}
.tab{padding:6px 16px;border-radius:var(--radius-xs);cursor:pointer;font-weight:500;font-size:.82rem;color:var(--fg2);transition:var(--transition);white-space:nowrap;border:none;background:none}
.tab:hover{color:var(--fg)}
.tab.on{background:var(--bg2);color:var(--blue);box-shadow:var(--shadow)}
.search-wrap{flex:1;max-width:400px;position:relative}
.search-wrap input{width:100%;padding:7px 12px 7px 34px;border:1px solid var(--border);border-radius:var(--radius-sm);background:var(--bg);color:var(--fg);font-size:.85rem;outline:none;transition:var(--transition)}
.search-wrap input:focus{border-color:var(--blue);box-shadow:0 0 0 3px rgba(15,71,175,.1)}
.search-wrap .si{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--fg3);font-size:.9rem;pointer-events:none}
.search-wrap .sx{position:absolute;right:8px;top:50%;transform:translateY(-50%);background:none;border:none;color:var(--fg3);cursor:pointer;font-size:.85rem;display:none;padding:2px}
.hbtn{padding:6px 14px;border-radius:var(--radius-sm);border:1px solid var(--border);background:var(--bg2);color:var(--fg);font-size:.8rem;font-weight:500;cursor:pointer;transition:var(--transition);display:flex;align-items:center;gap:5px;white-space:nowrap}
.hbtn:hover{border-color:var(--blue);color:var(--blue)}
.hbtn.primary{background:var(--blue);color:#fff;border-color:var(--blue)}
.hbtn.primary:hover{background:var(--blue-dark)}
.hbtn.danger{color:var(--red);border-color:var(--red)}
.hbtn.danger:hover{background:var(--red-light)}
.badge{background:var(--gold-light);color:var(--gold);font-size:.7rem;font-weight:600;padding:1px 7px;border-radius:10px}
.counter{color:var(--fg3);font-size:.78rem;white-space:nowrap}
.dark-toggle{background:none;border:none;font-size:1.1rem;cursor:pointer;padding:4px}

/* ═══════════ LAYOUT ═══════════ */
.layout{display:flex;height:calc(100vh - var(--header-h))}
.sidebar{width:var(--sidebar-w);border-right:1px solid var(--border);background:var(--bg2);overflow-y:auto;flex-shrink:0;padding:14px;display:flex;flex-direction:column;gap:14px;transition:var(--transition)}
.main{flex:1;overflow:hidden;display:flex;flex-direction:column;background:var(--bg)}
.edit-panel{width:0;overflow:hidden;border-left:1px solid var(--border);background:var(--bg2);transition:width .3s ease;flex-shrink:0}
.edit-panel.open{width:var(--edit-w);overflow-y:auto}

/* ═══════════ SIDEBAR ═══════════ */
.sb-section{display:flex;flex-direction:column;gap:8px}
.sb-label{font-size:.7rem;font-weight:600;text-transform:uppercase;letter-spacing:.06em;color:var(--fg3);padding-bottom:2px}
.sb-import{border:2px dashed var(--border);border-radius:var(--radius);padding:20px 12px;text-align:center;color:var(--fg3);font-size:.78rem;cursor:pointer;transition:var(--transition)}
.sb-import:hover,.sb-import.drag{border-color:var(--blue);color:var(--blue);background:var(--blue-lighter)}
.sb-import input{display:none}
.sb-check{display:flex;align-items:center;gap:6px;font-size:.8rem;color:var(--fg2);cursor:pointer;padding:1px 0}
.sb-check input{accent-color:var(--blue);cursor:pointer}
.sb-check:hover{color:var(--fg)}
.sb-range{display:flex;flex-direction:column;gap:4px}
.sb-range input[type=range]{width:100%;accent-color:var(--blue)}
.sb-range .rv{font-size:.75rem;color:var(--fg2)}
.sb-stat{font-size:.72rem;color:var(--fg3);padding:8px 0;border-top:1px solid var(--border2);line-height:1.7}

/* ═══════════ PROFILE LIST ═══════════ */
.list-header{display:flex;align-items:center;justify-content:space-between;padding:10px 16px;border-bottom:1px solid var(--border2);background:var(--bg3)}
.list-header .lh-left{font-size:.78rem;color:var(--fg2)}
.list-sort{padding:4px 10px;border:1px solid var(--border);border-radius:var(--radius-xs);background:var(--bg2);color:var(--fg2);font-size:.75rem;cursor:pointer}
.list-container{flex:1;overflow-y:auto;position:relative}
.profile-row{display:flex;align-items:center;padding:10px 16px;border-bottom:1px solid var(--border2);cursor:pointer;transition:background .12s;gap:12px}
.profile-row:hover{background:var(--blue-lighter)}
.profile-row.editing{background:var(--blue-light)}
.profile-row.modified{border-left:3px solid var(--gold)}
.pr-num{font-size:.72rem;color:var(--fg3);width:36px;text-align:right;flex-shrink:0}
.pr-main{flex:1;min-width:0}
.pr-name{font-weight:600;font-size:.88rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.pr-addr{font-size:.73rem;color:var(--fg2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:1px}
.pr-meta{display:flex;align-items:center;gap:8px;flex-shrink:0}
.pr-rating{font-size:.73rem;color:var(--gold);font-weight:600}
.pr-reviews{font-size:.68rem;color:var(--fg3)}
.pr-badge{font-size:.66rem;padding:2px 8px;border-radius:10px;font-weight:500;white-space:nowrap}
.pr-badge.restaurant{background:#e8f5e9;color:#2e7d32}.dark .pr-badge.restaurant{background:#1a2e1d;color:#66bb6a}
.pr-badge.bar{background:#fce4ec;color:#c62828}.dark .pr-badge.bar{background:#2e1519;color:#ef5350}
.pr-badge.cafe,.pr-badge.café{background:#fff3e0;color:#e65100}.dark .pr-badge.cafe,.dark .pr-badge.café{background:#2e2010;color:#ff9800}
.pr-badge.backerei,.pr-badge.bäckerei{background:#f3e5f5;color:#7b1fa2}.dark .pr-badge.backerei,.dark .pr-badge.bäckerei{background:#251530;color:#ba68c8}
.pr-badge.hotel{background:var(--blue-light);color:var(--blue)}
.pr-badge.takeaway{background:#e0f7fa;color:#00695c}.dark .pr-badge.takeaway{background:#0d2625;color:#4db6ac}
.pr-badge.default{background:var(--bg);color:var(--fg2)}
.pr-actions{display:flex;gap:2px;flex-shrink:0;opacity:.4;transition:opacity .15s}
.profile-row:hover .pr-actions{opacity:1}
.pr-btn{background:none;border:none;cursor:pointer;padding:4px 6px;border-radius:var(--radius-xs);font-size:.85rem;transition:var(--transition)}
.pr-btn:hover{background:var(--bg)}
.pr-btn.del:hover{background:var(--red-light)}

/* ═══════════ EDIT PANEL ═══════════ */
.ep-header{display:flex;align-items:center;justify-content:space-between;padding:14px 18px;border-bottom:1px solid var(--border2);position:sticky;top:0;background:var(--bg2);z-index:5}
.ep-title{font-family:var(--font-display);font-size:1.15rem;color:var(--fg);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1}
.ep-close{background:none;border:none;font-size:1.1rem;cursor:pointer;color:var(--fg3);padding:4px;margin-left:8px;flex-shrink:0}
.ep-close:hover{color:var(--fg)}
.ep-body{padding:18px;display:flex;flex-direction:column;gap:14px}
.ep-field{display:flex;flex-direction:column;gap:4px}
.ep-field label{font-size:.7rem;font-weight:600;text-transform:uppercase;letter-spacing:.04em;color:var(--fg3)}
.ep-field-row{display:flex;gap:6px;align-items:stretch}
.ep-field input,.ep-field select{flex:1;padding:7px 10px;border:1px solid var(--border);border-radius:var(--radius-xs);background:var(--bg);color:var(--fg);outline:none;transition:border-color .2s, background .2s, box-shadow .2s}
.ep-field input:focus,.ep-field select:focus{border-color:var(--blue);box-shadow:0 0 0 2px rgba(15,71,175,.1)}
.ep-field input.dirty{background:var(--gold-light);border-color:var(--gold)}
.ep-field input.saved,.ep-field select.saved{border-color:var(--green);background:var(--green-light)}
.ep-field input[readonly]{background:var(--bg3);color:var(--fg3);cursor:not-allowed}
.ep-save{padding:6px 10px;border:1px solid var(--border);border-radius:var(--radius-xs);background:var(--bg2);cursor:pointer;font-size:.85rem;transition:var(--transition);flex-shrink:0;min-width:36px;text-align:center}
.ep-save:hover{border-color:var(--blue);background:var(--blue-lighter)}
.ep-save.saved{border-color:var(--green);background:var(--green-light)}
.ep-link{font-size:.72rem;color:var(--blue);cursor:pointer;margin-top:2px;display:inline-flex;align-items:center;gap:3px}
.ep-link:hover{text-decoration:underline}
.ep-divider{border:none;border-top:1px solid var(--border2);margin:4px 0}
.ep-section{font-size:.78rem;font-weight:600;color:var(--fg);display:flex;align-items:center;gap:6px}

/* ═══════════ TAG EDITOR ═══════════ */
.tag-wrap{display:flex;flex-direction:column;gap:4px}
.tag-area{display:flex;flex-wrap:wrap;gap:4px;padding:8px;border:1px solid var(--border);border-radius:var(--radius-xs);background:var(--bg);min-height:38px;transition:border-color .2s}
.tag-area.dirty{border-color:var(--gold);background:var(--gold-light)}
.tag-area.saved{border-color:var(--green);background:var(--green-light)}
.tag-chip{display:inline-flex;align-items:center;gap:3px;padding:2px 8px;border-radius:12px;font-size:.72rem;font-weight:500;background:var(--blue-light);color:var(--blue);white-space:nowrap;animation:chipIn .2s ease}
@keyframes chipIn{from{opacity:0;transform:scale(.8)}to{opacity:1;transform:scale(1)}}
.tag-chip .tx{cursor:pointer;margin-left:2px;opacity:.5;font-size:.8rem;line-height:1}
.tag-chip .tx:hover{opacity:1;color:var(--red)}
.tag-add{position:relative;flex:1;min-width:120px}
.tag-add input{border:none;background:none;outline:none;font-size:.78rem;width:100%;color:var(--fg);padding:2px 0}
.tag-dd{position:absolute;top:calc(100% + 4px);left:0;right:0;max-height:200px;overflow-y:auto;background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius-xs);box-shadow:var(--shadow-lg);z-index:20;display:none}
.tag-dd.show{display:block}
.tag-dd-item{padding:6px 10px;font-size:.78rem;cursor:pointer;color:var(--fg2);transition:background .1s}
.tag-dd-item:hover,.tag-dd-item.hl{background:var(--blue-lighter);color:var(--blue)}
.tag-dd-item.used{opacity:.35;pointer-events:none;text-decoration:line-through}
.tag-bottom{display:flex;justify-content:space-between;align-items:center}
.tag-count{font-size:.7rem;color:var(--fg3)}

/* ═══════════ CONFIRM DIALOG ═══════════ */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:200;display:flex;align-items:center;justify-content:center;backdrop-filter:blur(4px);opacity:0;pointer-events:none;transition:opacity .2s}
.overlay.show{opacity:1;pointer-events:auto}
.dialog{background:var(--bg2);border-radius:var(--radius);padding:24px;max-width:380px;width:90%;box-shadow:var(--shadow-lg);transform:scale(.95);transition:transform .2s}
.overlay.show .dialog{transform:scale(1)}
.dialog h3{font-size:1rem;margin-bottom:8px}
.dialog p{font-size:.85rem;color:var(--fg2);margin-bottom:18px;word-break:break-word}
.dialog-btns{display:flex;gap:8px;justify-content:flex-end}

/* ═══════════ TOAST ═══════════ */
.toast-container{position:fixed;bottom:20px;right:20px;z-index:300;display:flex;flex-direction:column;gap:8px}
.toast{padding:10px 16px;border-radius:var(--radius-sm);background:var(--fg);color:var(--bg);font-size:.82rem;box-shadow:var(--shadow-lg);animation:toastIn .3s ease;display:flex;align-items:center;gap:8px;max-width:360px}
.toast.error{background:var(--red)}
.toast.success{background:var(--green);color:#fff}
@keyframes toastIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}

/* ═══════════ EMPTY STATE ═══════════ */
.empty-state{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;color:var(--fg3);gap:12px;padding:40px}
.empty-state .ei{font-size:3rem;opacity:.4}
.empty-state p{font-size:.88rem;text-align:center;max-width:300px;line-height:1.6}

/* ═══════════ PAGINATION ═══════════ */
.pagination{display:flex;align-items:center;justify-content:center;gap:4px;padding:10px;border-top:1px solid var(--border2);background:var(--bg3)}
.pg-btn{padding:4px 10px;border:1px solid var(--border);border-radius:var(--radius-xs);background:var(--bg2);color:var(--fg2);font-size:.75rem;cursor:pointer;transition:var(--transition)}
.pg-btn:hover:not(:disabled){border-color:var(--blue);color:var(--blue)}
.pg-btn:disabled{opacity:.3;cursor:not-allowed}
.pg-btn.on{background:var(--blue);color:#fff;border-color:var(--blue)}
.pg-info{font-size:.72rem;color:var(--fg3)}

/* ═══════════ RESPONSIVE ═══════════ */
@media(max-width:1000px){.sidebar{width:220px;padding:10px}.edit-panel.open{width:360px}}
@media(max-width:700px){
  .sidebar{display:none}
  .edit-panel.open{width:100%;position:fixed;inset:0;top:var(--header-h);z-index:150}
  .header{padding:0 10px;gap:8px}
  .header .counter,.header .badge{display:none}
}
</style>
</head>
<body>

<!-- ═══════════ HEADER ═══════════ -->
<header class="header">
  <div class="logo">ZüriHub<span>Editor</span></div>
  <div class="tabs">
    <button class="tab on" data-mode="gastro" onclick="switchMode('gastro')">🍽️ Gastro</button>
    <button class="tab" data-mode="attr" onclick="switchMode('attr')">🏛️ Attraktionen</button>
  </div>
  <div class="search-wrap">
    <span class="si">🔍</span>
    <input type="text" id="searchInput" placeholder="Name, Adresse, Kategorie…" oninput="onSearchDebounced()">
    <button class="sx" id="searchClear" onclick="clearSearch()">✕</button>
  </div>
  <span class="counter" id="counter">Keine Daten</span>
  <span class="badge" id="changesBadge" style="display:none">0</span>
  <button class="hbtn" onclick="addProfile()">+ Neu</button>
  <button class="hbtn primary" onclick="exportJSON()">💾 Export</button>
  <button class="dark-toggle" id="darkBtn" onclick="toggleDark()" title="Dark Mode">🌙</button>
</header>

<!-- ═══════════ LAYOUT ═══════════ -->
<div class="layout">
  <aside class="sidebar" id="sidebar">
    <div class="sb-section">
      <div class="sb-label">📂 JSON importieren</div>
      <div class="sb-import" id="dropZone">
        JSON-Datei hierher ziehen<br>oder <b>klicken</b>
        <input type="file" id="fileInput" accept=".json">
      </div>
    </div>
    <div class="sb-section" id="filterSection" style="display:none">
      <div class="sb-label" id="filterLabel">Filter</div>
      <div id="filterChecks"></div>
    </div>
    <div class="sb-section" id="ratingSection" style="display:none">
      <div class="sb-label">⭐ Mindestbewertung</div>
      <div class="sb-range">
        <input type="range" id="ratingSlider" min="0" max="5" step="0.5" value="0" oninput="onFilterChange()">
        <div class="rv" id="ratingVal">Alle (0+)</div>
      </div>
    </div>
    <div class="sb-section" id="statusSection" style="display:none">
      <div class="sb-label">Status</div>
      <div id="statusChecks"></div>
    </div>
    <div class="sb-stat" id="statInfo"></div>
  </aside>

  <div class="main">
    <div class="list-header">
      <span class="lh-left" id="listInfo">Lade Daten…</span>
      <select class="list-sort" id="sortSelect" onchange="onSortChange()">
        <option value="name">Name A–Z</option>
        <option value="name-desc">Name Z–A</option>
        <option value="rating" selected>Bewertung ↓</option>
        <option value="reviews">Reviews ↓</option>
      </select>
    </div>
    <div class="list-container" id="listContainer">
      <div class="empty-state" id="emptyState">
        <div class="ei">📁</div>
        <p>Importiere eine JSON-Datei über die Sidebar um Profile zu bearbeiten</p>
      </div>
    </div>
    <div class="pagination" id="pagination" style="display:none"></div>
  </div>

  <div class="edit-panel" id="editPanel">
    <div class="ep-header">
      <div class="ep-title" id="epTitle">Profil bearbeiten</div>
      <button class="ep-close" onclick="closeEdit()">✕</button>
    </div>
    <div class="ep-body" id="epBody"></div>
  </div>
</div>

<div class="overlay" id="overlay" onclick="if(event.target===this)closeDialog()">
  <div class="dialog" id="dialog"></div>
</div>
<div class="toast-container" id="toasts"></div>

<script>
/* ═══════════════════════════════════════════════════════════════
   ZüriHub JSON Editor — Core Engine
   ═══════════════════════════════════════════════════════════════ */

// ── STATE ──
let MODE='gastro', DATA=[], META=null, FILTERED=[], CHANGES=new Set(), EDITING=null, PAGE=0;
const PER_PAGE=60;
let searchTerm='', minRating=0;
let activeFilters={trade:new Set(),status:new Set(),keyword:new Set()};

// ── CONSTANTS ──
const TRADES=['Restaurant','Bar','Café','Bäckerei','Hotel','Takeaway','Einkaufszentrum'];
const STATUSES=['OPERATIONAL','CLOSED_TEMPORARILY','CLOSED_PERMANENTLY'];
const TYPES_G=['indian_restaurant','restaurant','food','point_of_interest','establishment','vegan_restaurant','vegetarian_restaurant','steak_house','barbecue_restaurant','pizza_restaurant','sushi_restaurant','hamburger_restaurant','kebab_shop','fast_food_restaurant','seafood_restaurant','breakfast_restaurant','brunch_restaurant','bistro','buffet_restaurant','ramen_restaurant','sandwich_shop','fusion_restaurant','family_restaurant','swiss_restaurant','italian_restaurant','turkish_restaurant','greek_restaurant','thai_restaurant','japanese_restaurant','chinese_restaurant','vietnamese_restaurant','korean_restaurant','mexican_restaurant','lebanese_restaurant','american_restaurant','french_restaurant','spanish_restaurant','mediterranean_restaurant','middle_eastern_restaurant','asian_restaurant','european_restaurant','african_restaurant','indonesian_restaurant','persian_restaurant','cocktail_bar','wine_bar','pub','hookah_bar','lounge_bar','night_club','beer_garden','sports_bar','brewery','confectionery','pastry_shop','ice_cream_shop','dessert_shop','chocolate_shop','coffee_shop','meal_takeaway','meal_delivery','food_delivery','catering_service','pizza_delivery','snack_bar','cafe','bar','bakery','lodging','hotel','grocery_store','event_venue','shopping_mall','department_store'];
const KW_A=['Sehenswürdigkeit','Historische Sehenswürdigkeit','Aussichtsplattform','Landschaftlich schöner Ort','Wandern','Berggipfel','Park','Botanischer Garten','Garten','Naturschutzgebiet','Landschaftsschutzgebiet','Monument','Denkmal','Skulptur','Kulturelles Denkmal','Kriegsdenkmal','Barbecuebereich','Höhle','Fluss','Spielplatz','Vergnügungspark','Picknickstellen','Campingplatz','Zoo','Tierzoo','Kinderzoo','Wildpark','Vogelbeobachtungsgebiet'];
const TYPES_A=['tourist_attraction','park','natural_feature','zoo','lodging','campground','museum','restaurant','amusement_park','rv_park','landmark','church','place_of_worship','spa','aquarium','transit_station','airport','establishment','point_of_interest','health'];

// ── HELPERS ──
const $=s=>document.getElementById(s);
const esc=s=>s?String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;'):'';
const fmt=n=>n>=1000?(n/1000).toFixed(1).replace('.0','')+'k':String(n);
function debounce(fn,ms){let t;return(...a)=>{clearTimeout(t);t=setTimeout(()=>fn(...a),ms)}}
function gid(p){return MODE==='gastro'?p.id:p.place_id}
function gname(p){return p.name||''}
function gaddr(p){return MODE==='gastro'?(p.address||''):(p.adresse||'')}
function grat(p){return MODE==='gastro'?(p.rating||0):(p.rating_durchschnitt||0)}
function grev(p){return MODE==='gastro'?(p.reviewCount||0):(p.rating_anzahl||0)}
function gtrade(p){return MODE==='gastro'?(p.trade||''):(p.gefunden_via_keyword||'').split(',')[0].trim()}
function glat(p){return MODE==='gastro'?(p.lat||0):(p.koordinaten&&p.koordinaten.lat||0)}
function glng(p){return MODE==='gastro'?(p.lng||0):(p.koordinaten&&p.koordinaten.lng||0)}
function stars(r){let s='';for(let i=1;i<=5;i++)s+=i<=r?'★':(i-.5<=r?'★':'☆');return s}

// ── DARK MODE ──
function toggleDark(){
  document.documentElement.classList.toggle('dark');
  const d=document.documentElement.classList.contains('dark');
  try{localStorage.setItem('zh-dark',d?'1':'0')}catch(e){}
  $('darkBtn').textContent=d?'☀️':'🌙';
}
(function(){try{if(localStorage.getItem('zh-dark')==='1'){document.documentElement.classList.add('dark');$('darkBtn').textContent='☀️'}}catch(e){}})();

// ── TOAST ──
function toast(msg,type=''){
  const t=document.createElement('div');t.className='toast '+type;t.textContent=msg;
  $('toasts').appendChild(t);
  setTimeout(()=>{t.style.opacity='0';t.style.transition='opacity .3s';setTimeout(()=>t.remove(),300)},3000);
}

// ── DIALOG ──
function showDialog(title,message,onOk,okLabel='Löschen'){
  $('dialog').innerHTML=`<h3>${esc(title)}</h3><p>${message}</p><div class="dialog-btns"><button class="hbtn" onclick="closeDialog()">Abbrechen</button><button class="hbtn danger" id="dlgOk">${esc(okLabel)}</button></div>`;
  $('overlay').classList.add('show');
  $('dlgOk').onclick=()=>{closeDialog();onOk()};
}
function closeDialog(){$('overlay').classList.remove('show')}

// ── FILE IMPORT ──
(function(){
  const dz=$('dropZone'),fi=$('fileInput');
  dz.onclick=()=>fi.click();
  dz.ondragover=e=>{e.preventDefault();dz.classList.add('drag')};
  dz.ondragleave=()=>dz.classList.remove('drag');
  dz.ondrop=e=>{e.preventDefault();dz.classList.remove('drag');if(e.dataTransfer.files.length)loadFile(e.dataTransfer.files[0])};
  fi.onchange=()=>{if(fi.files[0])loadFile(fi.files[0])};
})();

function loadFile(file){
  const r=new FileReader();
  r.onload=function(e){
    try{
      const j=JSON.parse(e.target.result);
      if(Array.isArray(j)){MODE='gastro';DATA=j;META=null}
      else if(j.orte&&Array.isArray(j.orte)){MODE='attr';DATA=j.orte;META=j.meta||null}
      else{toast('Unbekanntes JSON-Format','error');return}
      document.querySelectorAll('.tab').forEach(t=>t.classList.toggle('on',t.dataset.mode===(MODE==='gastro'?'gastro':'attr')));
      CHANGES.clear();EDITING=null;closeEdit();resetFilters();buildFilters();apply();
      updateBadge();toast(DATA.length+" Profile geladen",'success');
    }catch(err){toast('Ungültiges JSON: '+err.message,'error')}
  };
  r.readAsText(file);
}

// ── MODE SWITCH ──
function switchMode(m){
  if(m===MODE&&DATA.length)return;
  MODE=m;
  document.querySelectorAll('.tab').forEach(t=>t.classList.toggle('on',t.dataset.mode===m));
  if(!DATA.length||confirm('Daten wechseln? Nicht exportierte Änderungen gehen verloren.')){
    DATA=[];META=null;CHANGES.clear();EDITING=null;closeEdit();resetFilters();buildFilters();apply();updateBadge();
  }
}

// ── FILTERS ──
function resetFilters(){
  activeFilters={trade:new Set(),status:new Set(),keyword:new Set()};
  minRating=0;searchTerm='';$('searchInput').value='';$('searchClear').style.display='none';
  $('ratingSlider').value=0;$('ratingVal').textContent='Alle (0+)';PAGE=0;
}

function buildFilters(){
  const fc=$('filterChecks'),sc=$('statusChecks');fc.innerHTML='';sc.innerHTML='';
  if(!DATA.length){$('filterSection').style.display='none';$('ratingSection').style.display='none';$('statusSection').style.display='none';return}
  $('filterSection').style.display='';$('ratingSection').style.display='';
  if(MODE==='gastro'){
    $('filterLabel').textContent='🍽️ Betriebsart';$('statusSection').style.display='';
    const tc={};DATA.forEach(p=>{tc[p.trade]=(tc[p.trade]||0)+1});
    TRADES.forEach(t=>{if(!tc[t])return;fc.innerHTML+=`<label class="sb-check"><input type="checkbox" data-f="trade" value="${esc(t)}" onchange="onFilterChange()"> ${esc(t)} <span style="color:var(--fg3);font-size:.65rem">(${tc[t]})</span></label>`});
    STATUSES.forEach(s=>{const l=s==='OPERATIONAL'?'✅ Offen':s==='CLOSED_TEMPORARILY'?'⏸ Temp. zu':'🔴 Geschlossen';sc.innerHTML+=`<label class="sb-check"><input type="checkbox" data-f="status" value="${esc(s)}" onchange="onFilterChange()"> ${l}</label>`});
  }else{
    $('filterLabel').textContent='🏛️ Kategorie';$('statusSection').style.display='none';
    const kc={};DATA.forEach(p=>(p.gefunden_via_keyword||'').split(',').map(k=>k.trim()).filter(Boolean).forEach(k=>{kc[k]=(kc[k]||0)+1}));
    KW_A.forEach(k=>{if(!kc[k])return;fc.innerHTML+=`<label class="sb-check"><input type="checkbox" data-f="keyword" value="${esc(k)}" onchange="onFilterChange()"> ${esc(k)} <span style="color:var(--fg3);font-size:.65rem">(${kc[k]})</span></label>`});
  }
}

function onFilterChange(){
  activeFilters.trade.clear();activeFilters.status.clear();activeFilters.keyword.clear();
  document.querySelectorAll('[data-f="trade"]:checked').forEach(c=>activeFilters.trade.add(c.value));
  document.querySelectorAll('[data-f="status"]:checked').forEach(c=>activeFilters.status.add(c.value));
  document.querySelectorAll('[data-f="keyword"]:checked').forEach(c=>activeFilters.keyword.add(c.value));
  minRating=parseFloat($('ratingSlider').value)||0;
  $('ratingVal').textContent=minRating>0?minRating+'+ Sterne':'Alle (0+)';
  PAGE=0;apply();
}

function onSearch(){
  searchTerm=$('searchInput').value.trim().toLowerCase();
  $('searchClear').style.display=searchTerm?'block':'none';PAGE=0;apply();
}
const onSearchDebounced=debounce(onSearch,250);
function clearSearch(){$('searchInput').value='';searchTerm='';$('searchClear').style.display='none';PAGE=0;apply();$('searchInput').focus()}
function onSortChange(){PAGE=0;apply()}

// ── APPLY FILTER + SORT + RENDER ──
function apply(){
  if(!DATA.length){
    FILTERED=[];$('emptyState').style.display='';$('pagination').style.display='none';
    $('counter').textContent='Keine Daten';$('listInfo').textContent='—';$('statInfo').textContent='';
    renderRows([]);return;
  }
  FILTERED=DATA.filter(p=>{
    if(grat(p)<minRating)return false;
    if(MODE==='gastro'){
      if(activeFilters.trade.size&&!activeFilters.trade.has(p.trade))return false;
      if(activeFilters.status.size&&!activeFilters.status.has(p.businessStatus))return false;
    }else{
      if(activeFilters.keyword.size){const kws=(p.gefunden_via_keyword||'').split(',').map(k=>k.trim());if(!kws.some(k=>activeFilters.keyword.has(k)))return false}
    }
    if(searchTerm){
      let hay=[gname(p),gaddr(p),gtrade(p),...(p.types||[])].join(' ').toLowerCase();
      if(MODE==='attr')hay+=' '+(p.gefunden_via_keyword||'').toLowerCase();
      if(!hay.includes(searchTerm))return false;
    }
    return true;
  });
  const sort=$('sortSelect').value;
  FILTERED.sort((a,b)=>{
    switch(sort){
      case'name':return gname(a).localeCompare(gname(b),'de');
      case'name-desc':return gname(b).localeCompare(gname(a),'de');
      case'rating':return grat(b)-grat(a)||grev(b)-grev(a);
      case'reviews':return grev(b)-grev(a);
    }return 0;
  });
  const totalPages=Math.max(1,Math.ceil(FILTERED.length/PER_PAGE));
  if(PAGE>=totalPages)PAGE=totalPages-1;
  const start=PAGE*PER_PAGE,end=Math.min(start+PER_PAGE,FILTERED.length);
  const slice=FILTERED.slice(start,end);
  renderRows(slice,start);
  renderPagination(totalPages);
  $('counter').textContent=FILTERED.length===DATA.length?DATA.length.toLocaleString('de-CH')+' Profile':FILTERED.length.toLocaleString('de-CH')+' / '+DATA.length.toLocaleString('de-CH');
  $('listInfo').textContent=`Seite ${PAGE+1} / ${totalPages}`;
  // Stats
  if(MODE==='gastro'){const tc={};DATA.forEach(p=>{tc[p.trade]=(tc[p.trade]||0)+1});$('statInfo').innerHTML=Object.entries(tc).sort((a,b)=>b[1]-a[1]).map(([t,c])=>`${t}: ${c}`).join('<br>')}
  else $('statInfo').textContent=DATA.length+' Attraktionen total';
}

function renderRows(slice,startIdx=0){
  const lc=$('listContainer');
  // Remove old rows
  lc.querySelectorAll('.profile-row').forEach(r=>r.remove());
  if(!slice.length){$('emptyState').style.display='';$('emptyState').querySelector('p').textContent=searchTerm?'Keine Treffer':'Keine Profile mit diesen Filtern';return}
  $('emptyState').style.display='none';
  const frag=document.createDocumentFragment();
  slice.forEach((p,i)=>{
    const id=gid(p),trade=gtrade(p);
    const bc=trade?trade.toLowerCase().replace(/ä/g,'ae').replace(/ö/g,'oe').replace(/ü/g,'ue'):'default';
    const row=document.createElement('div');
    row.className='profile-row'+(EDITING===id?' editing':'')+(CHANGES.has(id)?' modified':'');
    row.dataset.id=id;
    row.onclick=e=>{if(!e.target.closest('.pr-btn'))openEdit(id)};
    row.innerHTML=`<span class="pr-num">#${startIdx+i+1}</span><div class="pr-main"><div class="pr-name">${esc(gname(p))||'<em style="color:var(--fg3)">Unbenannt</em>'}</div><div class="pr-addr">${esc(gaddr(p))}</div></div><div class="pr-meta"><span class="pr-rating">${stars(grat(p))} ${grat(p).toFixed(1)}</span><span class="pr-reviews">(${fmt(grev(p))})</span>${trade?`<span class="pr-badge ${esc(bc)}">${esc(trade)}</span>`:''}</div><div class="pr-actions"><button class="pr-btn" onclick="openEdit('${esc(id)}')" title="Bearbeiten">✏️</button><button class="pr-btn del" onclick="event.stopPropagation();deleteProfile('${esc(id)}')" title="Löschen">🗑️</button></div>`;
    frag.appendChild(row);
  });
  lc.appendChild(frag);
}

function renderPagination(total){
  const pg=$('pagination');
  if(total<=1){pg.style.display='none';return}
  pg.style.display='flex';
  let h=`<button class="pg-btn" onclick="goPage(${PAGE-1})" ${PAGE===0?'disabled':''}>‹</button>`;
  const r=2;let s=Math.max(0,PAGE-r),e=Math.min(total-1,PAGE+r);
  if(s>0)h+=`<button class="pg-btn" onclick="goPage(0)">1</button>`;
  if(s>1)h+=`<span class="pg-info">…</span>`;
  for(let i=s;i<=e;i++)h+=`<button class="pg-btn${i===PAGE?' on':''}" onclick="goPage(${i})">${i+1}</button>`;
  if(e<total-2)h+=`<span class="pg-info">…</span>`;
  if(e<total-1)h+=`<button class="pg-btn" onclick="goPage(${total-1})">${total}</button>`;
  h+=`<button class="pg-btn" onclick="goPage(${PAGE+1})" ${PAGE===total-1?'disabled':''}>›</button>`;
  pg.innerHTML=h;
}
function goPage(p){const t=Math.ceil(FILTERED.length/PER_PAGE);if(p<0||p>=t)return;PAGE=p;apply();$('listContainer').scrollTop=0}

// ── DELETE ──
function deleteProfile(id){
  const p=DATA.find(x=>gid(x)===id);if(!p)return;
  showDialog('Profil löschen',`<b>${esc(gname(p))}</b> wirklich löschen?<br><span style="color:var(--fg3);font-size:.8rem">${esc(gaddr(p))}</span>`,()=>{
    DATA=DATA.filter(x=>gid(x)!==id);CHANGES.add('_del_'+id);
    if(EDITING===id)closeEdit();apply();updateBadge();toast('"'+gname(p)+'" gelöscht');
  });
}

// ── CHANGES BADGE ──
function updateBadge(){const n=CHANGES.size;const b=$('changesBadge');if(n>0){b.style.display='';b.textContent=n}else b.style.display='none'}

// ── EDIT PANEL ──
function openEdit(id){
  const p=DATA.find(x=>gid(x)===id);if(!p)return;
  EDITING=id;$('editPanel').classList.add('open');$('epTitle').textContent=gname(p)||'Neues Profil';
  buildEditForm(p);
  document.querySelectorAll('.profile-row').forEach(r=>r.classList.toggle('editing',r.dataset.id===id));
}
function closeEdit(){EDITING=null;$('editPanel').classList.remove('open');document.querySelectorAll('.profile-row').forEach(r=>r.classList.remove('editing'))}

function buildEditForm(p){
  const body=$('epBody');const id=gid(p);let h='';
  // ID
  h+=fld('ID',id,'text','_id',true);
  h+=fld('Name',gname(p),'text',MODE==='gastro'?'name':'name');
  h+=fld('Adresse',gaddr(p),'text',MODE==='gastro'?'address':'adresse');
  if(MODE==='gastro'){
    h+=ddl('Betriebsart',p.trade||'',TRADES,'trade');
    h+=ddl('Status',p.businessStatus||'OPERATIONAL',STATUSES,'businessStatus');
    h+=fld('Telefon',p.phone||'','tel','phone');
    h+=fld('Website',p.website||'','url','website');
    h+=`<a class="ep-link" onclick="testUrl('website')">🔗 Website testen</a>`;
    h+=fld('Google Maps URL',p.gmapsUrl||'','url','gmapsUrl');
    h+=`<a class="ep-link" onclick="testUrl('gmapsUrl')">🔗 Maps-Link testen</a>`;
    h+=fld('Bewertung',p.rating||0,'number','rating',false,'0','5','0.1');
    h+=fld('Reviews',p.reviewCount||0,'number','reviewCount',false,'0');
    h+=fld('Fotos',p.photoCount||0,'number','photoCount',false,'0');
  }else{
    h+=fld('Bewertung',p.rating_durchschnitt||0,'number','rating_durchschnitt',false,'0','5','0.1');
    h+=fld('Reviews',p.rating_anzahl||0,'number','rating_anzahl',false,'0');
  }
  h+='<hr class="ep-divider"><div class="ep-section">📍 Koordinaten</div>';
  if(MODE==='gastro'){h+=fld('Lat',p.lat||0,'number','lat',false,'45','48','0.000001');h+=fld('Lng',p.lng||0,'number','lng',false,'5','11','0.000001')}
  else{h+=fld('Lat',glat(p),'number','k_lat',false,'45','48','0.000001');h+=fld('Lng',glng(p),'number','k_lng',false,'5','11','0.000001')}
  h+=`<a class="ep-link" onclick="checkMap()">📍 Auf Google Maps prüfen</a>`;
  // Types
  h+='<hr class="ep-divider"><div class="ep-section">🏷️ Types</div>';
  h+=tagHTML('types',p.types||[]);
  // Keywords (attr)
  if(MODE==='attr'){
    h+='<hr class="ep-divider"><div class="ep-section">🔑 Keywords</div>';
    const kws=(p.gefunden_via_keyword||'').split(',').map(k=>k.trim()).filter(Boolean);
    h+=tagHTML('kw',kws);
  }
  h+=`<hr class="ep-divider"><button class="hbtn danger" style="width:100%;justify-content:center;margin-top:4px" onclick="deleteProfile('${esc(id)}')">🗑️ Profil löschen</button>`;
  body.innerHTML=h;
  initTE('types');if(MODE==='attr')initTE('kw');
}

function fld(label,val,type,key,ro,min,max,step){
  const v=typeof val==='number'?val:esc(String(val||''));
  const roA=ro?'readonly':'';
  const minA=min!=null?`min="${min}"`:'';
  const maxA=max!=null?`max="${max}"`:'';
  const stA=step!=null?`step="${step}"`:'';
  return`<div class="ep-field"><label>${esc(label)}</label><div class="ep-field-row"><input type="${type}" value="${v}" data-key="${key}" ${roA} ${minA} ${maxA} ${stA} oninput="markDirty(this)">${ro?'':`<button class="ep-save" onclick="saveField(this,'${key}')" title="Speichern">💾</button>`}</div></div>`;
}
function ddl(label,val,opts,key){
  return`<div class="ep-field"><label>${esc(label)}</label><div class="ep-field-row"><select data-key="${key}" onchange="markDirty(this)">${opts.map(o=>`<option value="${esc(o)}"${o===val?' selected':''}>${esc(o)}</option>`).join('')}</select><button class="ep-save" onclick="saveField(this,'${key}')" title="Speichern">💾</button></div></div>`;
}
function tagHTML(eid,tags){
  const chips=tags.map(t=>`<span class="tag-chip" data-tag="${esc(t)}">${esc(t)} <span class="tx" onclick="rmTag('${eid}',this)">✕</span></span>`).join('');
  return`<div class="tag-wrap" id="tw-${eid}"><div class="tag-area" id="ta-${eid}">${chips}<div class="tag-add"><input type="text" placeholder="Tag hinzufügen…" id="ti-${eid}" autocomplete="off"><div class="tag-dd" id="td-${eid}"></div></div></div><div class="tag-bottom"><span class="tag-count" id="tc-${eid}">${tags.length} Tags</span><button class="ep-save" onclick="saveTags('${eid}')" title="Tags speichern">💾</button></div></div>`;
}

// ── TAG EDITOR LOGIC ──
function initTE(eid){
  const inp=$('ti-'+eid),dd=$('td-'+eid);
  const opts=eid==='types'?(MODE==='gastro'?TYPES_G:TYPES_A):KW_A;
  let hlI=-1;
  inp.onfocus=()=>showDD(eid,opts);
  inp.oninput=()=>{hlI=-1;showDD(eid,opts)};
  inp.onblur=()=>setTimeout(()=>dd.classList.remove('show'),200);
  inp.onkeydown=e=>{
    const items=[...dd.querySelectorAll('.tag-dd-item:not(.used)')];
    if(e.key==='ArrowDown'){e.preventDefault();hlI=Math.min(hlI+1,items.length-1);hlDD(items,hlI)}
    else if(e.key==='ArrowUp'){e.preventDefault();hlI=Math.max(hlI-1,0);hlDD(items,hlI)}
    else if(e.key==='Enter'){e.preventDefault();if(hlI>=0&&items[hlI])addTagEl(eid,items[hlI].dataset.val);else if(inp.value.trim())addTagEl(eid,inp.value.trim());inp.value='';showDD(eid,opts)}
  };
}
function showDD(eid,opts){
  const inp=$('ti-'+eid),dd=$('td-'+eid),area=$('ta-'+eid);
  const cur=[...area.querySelectorAll('.tag-chip')].map(c=>c.dataset.tag);
  const q=inp.value.trim().toLowerCase();
  const f=opts.filter(o=>!q||o.toLowerCase().includes(q));
  if(!f.length&&!q){dd.classList.remove('show');return}
  dd.innerHTML=f.map(o=>`<div class="tag-dd-item${cur.includes(o)?' used':''}" data-val="${esc(o)}" onmousedown="addTagEl('${eid}','${esc(o).replace(/'/g,"\\'")}');$('ti-${eid}').value=''">${esc(o)}</div>`).join('');
  dd.classList.add('show');
}
function hlDD(items,idx){items.forEach((it,i)=>it.classList.toggle('hl',i===idx));if(items[idx])items[idx].scrollIntoView({block:'nearest'})}

function addTagEl(eid,tag){
  const area=$('ta-'+eid);
  const cur=[...area.querySelectorAll('.tag-chip')].map(c=>c.dataset.tag);
  if(cur.includes(tag))return;
  const addDiv=area.querySelector('.tag-add');
  const chip=document.createElement('span');chip.className='tag-chip';chip.dataset.tag=tag;
  chip.innerHTML=`${esc(tag)} <span class="tx" onclick="rmTag('${eid}',this)">✕</span>`;
  area.insertBefore(chip,addDiv);
  $('tc-'+eid).textContent=(cur.length+1)+' Tags';
  area.classList.add('dirty');area.classList.remove('saved');
}
function rmTag(eid,btn){
  btn.parentElement.remove();
  const area=$('ta-'+eid);
  $('tc-'+eid).textContent=area.querySelectorAll('.tag-chip').length+' Tags';
  area.classList.add('dirty');area.classList.remove('saved');
}

// ── SAVE LOGIC ──
function markDirty(el){el.classList.add('dirty');el.classList.remove('saved')}

function saveField(btn,key){
  if(!EDITING)return;
  const p=DATA.find(x=>gid(x)===EDITING);if(!p)return;
  const inp=btn.parentElement.querySelector('input,select');
  let val=inp.value;
  // Coerce numbers
  const numKeys=['rating','reviewCount','photoCount','lat','lng','rating_durchschnitt','rating_anzahl','k_lat','k_lng'];
  if(numKeys.includes(key))val=parseFloat(val)||0;
  // Apply
  if(key==='k_lat'){if(!p.koordinaten)p.koordinaten={lat:0,lng:0};p.koordinaten.lat=val}
  else if(key==='k_lng'){if(!p.koordinaten)p.koordinaten={lat:0,lng:0};p.koordinaten.lng=val}
  else if(key!=='_id')p[key]=val;
  CHANGES.add(gid(p));updateBadge();
  // Visual feedback
  inp.classList.remove('dirty');inp.classList.add('saved');btn.classList.add('saved');btn.textContent='✅';
  setTimeout(()=>{btn.textContent='💾';btn.classList.remove('saved');inp.classList.remove('saved')},1500);
  $('epTitle').textContent=gname(p)||'Profil';
  apply();
}

function saveTags(eid){
  if(!EDITING)return;
  const p=DATA.find(x=>gid(x)===EDITING);if(!p)return;
  const area=$('ta-'+eid);
  const tags=[...area.querySelectorAll('.tag-chip')].map(c=>c.dataset.tag);
  if(eid==='types')p.types=tags;
  else if(eid==='kw')p.gefunden_via_keyword=tags.join(', ');
  CHANGES.add(gid(p));updateBadge();
  area.classList.remove('dirty');area.classList.add('saved');
  const btn=area.parentElement.querySelector('.ep-save');
  if(btn){btn.classList.add('saved');btn.textContent='✅';setTimeout(()=>{btn.textContent='💾';btn.classList.remove('saved');area.classList.remove('saved')},1500)}
  toast('Tags gespeichert','success');
}

// ── URL TEST ──
function testUrl(key){const inp=$('epBody').querySelector(`[data-key="${key}"]`);if(inp&&inp.value)window.open(inp.value,'_blank');else toast('Kein Link vorhanden','error')}
function checkMap(){
  const lk=MODE==='gastro'?'lat':'k_lat',nk=MODE==='gastro'?'lng':'k_lng';
  const la=$('epBody').querySelector(`[data-key="${lk}"]`),lo=$('epBody').querySelector(`[data-key="${nk}"]`);
  if(la&&lo)window.open(`https://www.google.com/maps?q=${la.value},${lo.value}`,'_blank');
}

// ── ADD PROFILE ──
function addProfile(){
  const id='custom_'+Date.now();let p;
  if(MODE==='gastro')p={id,name:'',address:'',lat:47.3769,lng:8.5417,rating:0,reviewCount:0,gmapsUrl:'',website:'',phone:'',photoCount:0,trade:'Restaurant',types:[],businessStatus:'OPERATIONAL'};
  else p={name:'',adresse:'',rating_durchschnitt:0,rating_anzahl:0,place_id:id,gefunden_via_keyword:'',types:[],koordinaten:{lat:47.3769,lng:8.5417}};
  DATA.unshift(p);CHANGES.add(id);updateBadge();PAGE=0;apply();openEdit(id);toast('Neues Profil erstellt','success');
}

// ── EXPORT ──
function exportJSON(){
  if(!DATA.length){toast('Keine Daten','error');return}
  // Validate
  const errs=[];
  DATA.forEach((p,i)=>{
    if(!gname(p))errs.push(`#${i+1}: Name fehlt`);
    if(!gid(p))errs.push(`#${i+1}: ID fehlt`);
    const r=grat(p);if(r<0||r>5)errs.push(`#${i+1}: Rating ungültig (${r})`);
    const la=glat(p),lo=glng(p);
    if(la&&(la<45||la>48))errs.push(`#${i+1} "${gname(p)}": Lat ausserhalb CH`);
    if(lo&&(lo<5||lo>11))errs.push(`#${i+1} "${gname(p)}": Lng ausserhalb CH`);
    if(!Array.isArray(p.types))errs.push(`#${i+1}: types kein Array`);
    if(MODE==='attr'&&(!p.koordinaten||typeof p.koordinaten!=='object'))errs.push(`#${i+1}: koordinaten fehlt`);
  });
  if(errs.length){
    toast(errs.length+' Validierungswarnungen','error');
    console.warn('Validierung:',errs);
    if(!confirm(`${errs.length} Warnungen:\n\n${errs.slice(0,5).join('\n')}${errs.length>5?'\n…':''}\n\nTrotzdem exportieren?`))return;
  }
  let str,fn;
  if(MODE==='gastro'){
    const c=DATA.map(p=>({
      id:p.id||'',name:p.name||'',address:p.address||'',
      lat:typeof p.lat==='number'?p.lat:parseFloat(p.lat)||0,
      lng:typeof p.lng==='number'?p.lng:parseFloat(p.lng)||0,
      rating:typeof p.rating==='number'?p.rating:parseFloat(p.rating)||0,
      reviewCount:typeof p.reviewCount==='number'?p.reviewCount:parseInt(p.reviewCount)||0,
      gmapsUrl:p.gmapsUrl||'',website:p.website||'',phone:p.phone||'',
      photoCount:typeof p.photoCount==='number'?p.photoCount:parseInt(p.photoCount)||0,
      trade:p.trade||'',types:Array.isArray(p.types)?p.types:[],businessStatus:p.businessStatus||'OPERATIONAL'
    }));
    str=JSON.stringify(c,null,2);fn='gastro.json';
  }else{
    const c=DATA.map(p=>({
      name:p.name||'',adresse:p.adresse||'',
      rating_durchschnitt:typeof p.rating_durchschnitt==='number'?p.rating_durchschnitt:parseFloat(p.rating_durchschnitt)||0,
      rating_anzahl:typeof p.rating_anzahl==='number'?p.rating_anzahl:parseInt(p.rating_anzahl)||0,
      place_id:p.place_id||'',gefunden_via_keyword:p.gefunden_via_keyword||'',
      types:Array.isArray(p.types)?p.types:[],
      koordinaten:{lat:(p.koordinaten&&typeof p.koordinaten.lat==='number')?p.koordinaten.lat:0,lng:(p.koordinaten&&typeof p.koordinaten.lng==='number')?p.koordinaten.lng:0}
    }));
    str=JSON.stringify({meta:META||{},orte:c},null,2);fn='zuerich_attraktionen.json';
  }
  const blob=new Blob([str],{type:'application/json;charset=utf-8'});
  const url=URL.createObjectURL(blob);const a=document.createElement('a');
  a.href=url;a.download=fn;document.body.appendChild(a);a.click();document.body.removeChild(a);URL.revokeObjectURL(url);
  CHANGES.clear();updateBadge();toast(`${fn} exportiert (${DATA.length} Profile)`,'success');
}

// ── BEFOREUNLOAD ──
window.addEventListener('beforeunload',e=>{if(CHANGES.size>0){e.preventDefault();e.returnValue=''}});

// ── KEYBOARD ──
document.addEventListener('keydown',e=>{
  if(e.key==='Escape'&&EDITING)closeEdit();
  if((e.metaKey||e.ctrlKey)&&e.key==='f'){e.preventDefault();$('searchInput').focus()}
});

// ── INIT ──
apply();
</script>
