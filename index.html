<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JSON Profile Editor</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0e0f11;
    --surface: #16181c;
    --surface2: #1e2026;
    --border: #2a2d35;
    --accent: #4fffb0;
    --accent-dim: rgba(79,255,176,0.12);
    --red: #ff4f6a;
    --red-dim: rgba(255,79,106,0.12);
    --text: #e8eaf0;
    --muted: #6b7280;
    --font-head: 'Syne', sans-serif;
    --font-mono: 'DM Mono', monospace;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--font-mono);
    min-height: 100vh;
  }

  /* ── Header ── */
  header {
    padding: 28px 40px 24px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 20px;
    position: sticky;
    top: 0;
    background: var(--bg);
    z-index: 100;
  }

  header h1 {
    font-family: var(--font-head);
    font-weight: 800;
    font-size: 1.4rem;
    color: var(--accent);
    letter-spacing: -0.5px;
    flex: 1;
  }

  .stat-badge {
    background: var(--surface2);
    border: 1px solid var(--border);
    padding: 6px 14px;
    border-radius: 999px;
    font-size: 0.75rem;
    color: var(--muted);
  }
  .stat-badge span { color: var(--text); font-weight: 500; }

  /* ── Upload Zone ── */
  #upload-zone {
    margin: 60px auto;
    max-width: 560px;
    border: 2px dashed var(--border);
    border-radius: 16px;
    padding: 60px 40px;
    text-align: center;
    cursor: pointer;
    transition: border-color .2s, background .2s;
  }
  #upload-zone:hover, #upload-zone.dragover {
    border-color: var(--accent);
    background: var(--accent-dim);
  }
  #upload-zone .icon {
    font-size: 3rem;
    margin-bottom: 16px;
    display: block;
  }
  #upload-zone h2 {
    font-family: var(--font-head);
    font-weight: 700;
    font-size: 1.2rem;
    margin-bottom: 8px;
    color: var(--text);
  }
  #upload-zone p {
    color: var(--muted);
    font-size: 0.8rem;
  }
  #file-input { display: none; }

  /* ── Toolbar ── */
  #toolbar {
    padding: 16px 40px;
    display: flex;
    gap: 12px;
    align-items: center;
    border-bottom: 1px solid var(--border);
    flex-wrap: wrap;
  }

  #search-input {
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 8px 14px;
    border-radius: 8px;
    font-family: var(--font-mono);
    font-size: 0.8rem;
    width: 280px;
    outline: none;
    transition: border-color .2s;
  }
  #search-input:focus { border-color: var(--accent); }
  #search-input::placeholder { color: var(--muted); }

  .btn {
    padding: 8px 18px;
    border-radius: 8px;
    border: none;
    cursor: pointer;
    font-family: var(--font-mono);
    font-size: 0.8rem;
    font-weight: 500;
    transition: all .15s;
  }
  .btn-accent {
    background: var(--accent);
    color: #0a0b0d;
  }
  .btn-accent:hover { background: #3de89a; }
  .btn-ghost {
    background: var(--surface2);
    color: var(--muted);
    border: 1px solid var(--border);
  }
  .btn-ghost:hover { color: var(--text); border-color: var(--text); }
  .btn-danger {
    background: var(--red-dim);
    color: var(--red);
    border: 1px solid rgba(255,79,106,0.3);
  }
  .btn-danger:hover { background: rgba(255,79,106,0.2); }

  .toolbar-right { margin-left: auto; display: flex; gap: 10px; }

  /* ── Profile Grid ── */
  #profile-list {
    padding: 24px 40px 60px;
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(380px, 1fr));
    gap: 16px;
  }

  .profile-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    overflow: hidden;
    transition: border-color .2s;
  }
  .profile-card:hover { border-color: #3a3d47; }
  .profile-card.deleted {
    opacity: 0.35;
    border-color: var(--red);
    pointer-events: none;
  }

  .card-header {
    padding: 14px 16px 12px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: flex-start;
    gap: 10px;
  }
  .card-index {
    background: var(--surface2);
    color: var(--muted);
    font-size: 0.65rem;
    padding: 2px 7px;
    border-radius: 4px;
    margin-top: 2px;
    flex-shrink: 0;
  }
  .card-name {
    font-family: var(--font-head);
    font-weight: 700;
    font-size: 0.95rem;
    color: var(--text);
    flex: 1;
    line-height: 1.3;
  }
  .card-delete {
    background: none;
    border: none;
    color: var(--muted);
    cursor: pointer;
    font-size: 1rem;
    padding: 2px 4px;
    border-radius: 4px;
    transition: color .15s, background .15s;
    flex-shrink: 0;
  }
  .card-delete:hover { color: var(--red); background: var(--red-dim); }

  .card-body { padding: 14px 16px; }

  .field-row {
    margin-bottom: 10px;
  }
  .field-label {
    font-size: 0.65rem;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.06em;
    margin-bottom: 4px;
  }
  .field-value {
    font-size: 0.78rem;
    color: var(--text);
    line-height: 1.4;
    word-break: break-all;
  }
  .field-value.muted { color: var(--muted); font-style: italic; }

  /* Link editor */
  .link-editor {
    display: flex;
    gap: 6px;
    align-items: center;
  }
  .link-input {
    flex: 1;
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 7px 10px;
    border-radius: 7px;
    font-family: var(--font-mono);
    font-size: 0.72rem;
    outline: none;
    transition: border-color .2s;
  }
  .link-input:focus { border-color: var(--accent); }
  .link-input.changed { border-color: #f59e0b; }
  .link-test {
    background: none;
    border: 1px solid var(--border);
    color: var(--muted);
    padding: 6px 8px;
    border-radius: 7px;
    cursor: pointer;
    font-size: 0.75rem;
    transition: all .15s;
    white-space: nowrap;
  }
  .link-test:hover { border-color: var(--accent); color: var(--accent); }

  /* ── Empty / Loading ── */
  #empty-state {
    text-align: center;
    padding: 80px 40px;
    color: var(--muted);
  }
  #empty-state p { font-size: 0.85rem; margin-top: 8px; }

  /* ── Toast ── */
  #toast {
    position: fixed;
    bottom: 30px;
    right: 30px;
    background: var(--accent);
    color: #0a0b0d;
    padding: 12px 22px;
    border-radius: 10px;
    font-size: 0.82rem;
    font-weight: 500;
    opacity: 0;
    transform: translateY(10px);
    transition: all .3s;
    pointer-events: none;
    z-index: 999;
  }
  #toast.show { opacity: 1; transform: translateY(0); }
  #toast.error { background: var(--red); color: #fff; }

  /* ── Scrollbar ── */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
</style>
</head>
<body>

<header>
  <h1>JSON Profile Editor</h1>
  <div class="stat-badge" id="stat-total" style="display:none">Gesamt: <span id="cnt-total">0</span></div>
  <div class="stat-badge" id="stat-deleted" style="display:none">Gelöscht: <span id="cnt-deleted">0</span></div>
  <div class="stat-badge" id="stat-changed" style="display:none">Geändert: <span id="cnt-changed">0</span></div>
</header>

<input type="file" id="file-input" accept=".json">

<!-- Upload -->
<div id="upload-zone">
  <span class="icon">📂</span>
  <h2>JSON-Datei hochladen</h2>
  <p>Klicke hier oder ziehe deine .json-Datei hinein</p>
</div>

<!-- Toolbar (hidden until file loaded) -->
<div id="toolbar" style="display:none">
  <input type="text" id="search-input" placeholder="🔍  Name, Adresse oder Link suchen…">
  <button class="btn btn-ghost" id="show-all-btn">Alle anzeigen</button>
  <button class="btn btn-ghost" id="show-deleted-btn">Nur Gelöschte</button>
  <div class="toolbar-right">
    <button class="btn btn-danger" id="restore-btn">↩ Alle wiederherstellen</button>
    <button class="btn btn-accent" id="export-btn">⬇ JSON exportieren</button>
  </div>
</div>

<!-- Profile List -->
<div id="profile-list"></div>
<div id="empty-state" style="display:none">
  <p>Keine Profile gefunden.</p>
</div>

<div id="toast"></div>

<script>
let profiles = [];        // original parsed data (array of objects)
let deletedSet = new Set();   // indices of deleted entries
let changedLinks = {};        // { index: newLink }
let linkField = '';           // auto-detected field name for google maps link
let nameField = '';
let currentFilter = 'all';
let searchQuery = '';

// ── Upload ──────────────────────────────────────────────
const uploadZone = document.getElementById('upload-zone');
const fileInput = document.getElementById('file-input');

uploadZone.addEventListener('click', () => fileInput.click());
uploadZone.addEventListener('dragover', e => { e.preventDefault(); uploadZone.classList.add('dragover'); });
uploadZone.addEventListener('dragleave', () => uploadZone.classList.remove('dragover'));
uploadZone.addEventListener('drop', e => {
  e.preventDefault();
  uploadZone.classList.remove('dragover');
  const file = e.dataTransfer.files[0];
  if (file) loadFile(file);
});
fileInput.addEventListener('change', () => {
  if (fileInput.files[0]) loadFile(fileInput.files[0]);
});

function loadFile(file) {
  const reader = new FileReader();
  reader.onload = e => {
    try {
      const raw = JSON.parse(e.target.result);
      profiles = Array.isArray(raw) ? raw : (raw.results || raw.data || Object.values(raw));
      if (!profiles.length) throw new Error('Leer');
      detectFields();
      deletedSet.clear();
      changedLinks = {};
      uploadZone.style.display = 'none';
      document.getElementById('toolbar').style.display = 'flex';
      updateStats();
      renderAll();
      toast(`✅ ${profiles.length} Profile geladen`);
    } catch(err) {
      toast('❌ Fehler beim Laden der JSON-Datei', true);
    }
  };
  reader.readAsText(file);
}

function detectFields() {
  const sample = profiles[0];
  const keys = Object.keys(sample);
  // Detect link field
  const linkKeywords = ['url', 'link', 'maps', 'google', 'href', 'website', 'place_url', 'google_maps', 'maps_url'];
  linkField = keys.find(k => linkKeywords.some(kw => k.toLowerCase().includes(kw))) || '';
  // Detect name field
  const nameKeywords = ['name', 'titel', 'title', 'bezeichnung'];
  nameField = keys.find(k => nameKeywords.some(kw => k.toLowerCase().includes(kw))) || keys[0];
}

// ── Render ──────────────────────────────────────────────
function renderAll() {
  const list = document.getElementById('profile-list');
  const empty = document.getElementById('empty-state');
  list.innerHTML = '';

  const filtered = profiles.filter((p, i) => {
    if (currentFilter === 'deleted' && !deletedSet.has(i)) return false;
    if (searchQuery) {
      const q = searchQuery.toLowerCase();
      const txt = JSON.stringify(p).toLowerCase();
      if (!txt.includes(q)) return false;
    }
    return true;
  });

  if (!filtered.length) {
    empty.style.display = 'block';
    list.style.display = 'none';
    return;
  }
  empty.style.display = 'none';
  list.style.display = 'grid';

  filtered.forEach((p, _) => {
    const i = profiles.indexOf(p);
    list.appendChild(buildCard(p, i));
  });
}

function buildCard(p, i) {
  const card = document.createElement('div');
  card.className = 'profile-card' + (deletedSet.has(i) ? ' deleted' : '');
  card.dataset.index = i;

  const name = p[nameField] || `Eintrag ${i+1}`;
  const currentLink = changedLinks[i] !== undefined ? changedLinks[i] : (linkField ? (p[linkField] || '') : '');

  // Build a small preview of other interesting fields
  const previewKeys = Object.keys(p).filter(k => k !== nameField && k !== linkField).slice(0, 4);
  const previewRows = previewKeys.map(k => {
    const val = p[k];
    if (typeof val === 'object') return '';
    const str = String(val || '').trim();
    if (!str) return '';
    return `<div class="field-row">
      <div class="field-label">${k}</div>
      <div class="field-value ${str ? '' : 'muted'}">${str || '–'}</div>
    </div>`;
  }).join('');

  const linkChanged = changedLinks[i] !== undefined && changedLinks[i] !== (p[linkField] || '');

  card.innerHTML = `
    <div class="card-header">
      <span class="card-index">#${i+1}</span>
      <span class="card-name">${escHtml(name)}</span>
      <button class="card-delete" title="Profil löschen" onclick="toggleDelete(${i})">
        ${deletedSet.has(i) ? '↩' : '🗑'}
      </button>
    </div>
    <div class="card-body">
      ${previewRows}
      ${linkField ? `
      <div class="field-row">
        <div class="field-label">🔗 Google Maps Link</div>
        <div class="link-editor">
          <input class="link-input ${linkChanged ? 'changed' : ''}" 
            type="text" 
            value="${escAttr(currentLink)}" 
            placeholder="https://maps.google.com/..." 
            data-index="${i}"
            oninput="onLinkChange(this)">
          <button class="link-test" onclick="testLink(${i})">Testen ↗</button>
        </div>
      </div>` : ''}
    </div>
  `;
  return card;
}

function onLinkChange(input) {
  const i = parseInt(input.dataset.index);
  const original = linkField ? (profiles[i][linkField] || '') : '';
  const val = input.value;
  changedLinks[i] = val;
  input.classList.toggle('changed', val !== original);
  updateStats();
}

function testLink(i) {
  const link = changedLinks[i] !== undefined ? changedLinks[i] : (profiles[i][linkField] || '');
  if (link) window.open(link, '_blank');
  else toast('Kein Link vorhanden', true);
}

function toggleDelete(i) {
  if (deletedSet.has(i)) deletedSet.delete(i);
  else deletedSet.add(i);
  updateStats();
  renderAll();
}

// ── Toolbar Buttons ──────────────────────────────────────
document.getElementById('show-all-btn').addEventListener('click', () => {
  currentFilter = 'all';
  renderAll();
});
document.getElementById('show-deleted-btn').addEventListener('click', () => {
  currentFilter = 'deleted';
  renderAll();
});
document.getElementById('restore-btn').addEventListener('click', () => {
  deletedSet.clear();
  updateStats();
  renderAll();
  toast('Alle Profile wiederhergestellt');
});
document.getElementById('search-input').addEventListener('input', e => {
  searchQuery = e.target.value.trim();
  renderAll();
});

// ── Export ───────────────────────────────────────────────
document.getElementById('export-btn').addEventListener('click', () => {
  const result = profiles
    .filter((_, i) => !deletedSet.has(i))
    .map((p, _i) => {
      const origIndex = profiles.indexOf(p);
      const copy = { ...p };
      if (linkField && changedLinks[origIndex] !== undefined) {
        copy[linkField] = changedLinks[origIndex];
      }
      return copy;
    });

  const blob = new Blob([JSON.stringify(result, null, 2)], { type: 'application/json' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'profiles_bereinigt.json';
  a.click();
  toast(`✅ ${result.length} Profile exportiert (${deletedSet.size} gelöscht)`);
});

// ── Stats ────────────────────────────────────────────────
function updateStats() {
  document.getElementById('stat-total').style.display = 'flex';
  document.getElementById('stat-deleted').style.display = 'flex';
  document.getElementById('stat-changed').style.display = 'flex';
  document.getElementById('cnt-total').textContent = profiles.length;
  document.getElementById('cnt-deleted').textContent = deletedSet.size;
  const changedCount = Object.entries(changedLinks).filter(([i, v]) => v !== (profiles[i][linkField] || '')).length;
  document.getElementById('cnt-changed').textContent = changedCount;
}

// ── Toast ────────────────────────────────────────────────
function toast(msg, isError = false) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'show' + (isError ? ' error' : '');
  setTimeout(() => t.className = '', 2800);
}

// ── Helpers ──────────────────────────────────────────────
function escHtml(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function escAttr(s) { return String(s).replace(/"/g,'&quot;'); }
</script>
</body>
</html>
